<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UltraChat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#0a0f1a;
color:white;
}

.app{
display:flex;
height:100vh;
}

/* Servers */

.servers{
width:72px;
background:#0f172a;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:18px;
}

.server{
width:50px;
height:50px;
border-radius:50%;
background:#38bdf8;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:.25s;
font-weight:bold;
}

.server.active{
outline:3px solid white;
}

.server:hover{
border-radius:35%;
transform:scale(1.1);
}

/* Channels */

.channels{
width:240px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.channel{
padding:12px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.channel.active{
background:#0f172a;
}

.channel:hover{
background:#0f172a;
}

/* Chat */

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.chat-header{
padding:18px;
background:#020617;
border-bottom:1px solid #0f172a;
display:flex;
justify-content:space-between;
align-items:center;
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
padding:14px;
border-radius:14px;
width:fit-content;
max-width:70%;
animation:fade .2s;
}

.me{
background:#38bdf8;
align-self:flex-end;
color:black;
}

.other{
background:#0f172a;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

.chat-input{
padding:18px;
background:#020617;
display:flex;
gap:12px;
}

.chat-input input{
flex:1;
padding:14px;
border-radius:12px;
border:none;
outline:none;
background:#0f172a;
color:white;
}

.chat-input button{
padding:14px 22px;
border:none;
border-radius:12px;
background:#38bdf8;
cursor:pointer;
font-weight:bold;
}

/* Friends */

.friends{
width:230px;
background:#0f172a;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.friend{
padding:10px;
background:#020617;
border-radius:10px;
}

.profile{
margin-top:auto;
padding:15px;
background:#020617;
border-radius:15px;
display:flex;
align-items:center;
gap:10px;
}

@media(max-width:900px){
.friends{display:none;}
.channels{width:160px;}
}
</style>
</head>
<body>

<div class="app">

<div class="servers" id="servers"></div>

<div class="channels">
<h3 id="serverTitle">Main</h3>
<div id="channelList"></div>
</div>

<div class="chat">

<div class="chat-header">
<h2 id="channelTitle"># general</h2>
<span>Online • 1</span>
</div>

<div class="messages" id="messages"></div>

<div class="chat-input">
<input id="messageInput" placeholder="Message..." autocomplete="off">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<div class="friends">
<h3>Friends</h3>
<div class="friend">User1</div>
<div class="friend">User2</div>
<div class="friend">User3</div>

<div class="profile">
<div style="width:40px;height:40px;border-radius:50%;background:#38bdf8"></div>
<div>
<div id="usernameDisplay"></div>
<small style="opacity:.6">Online</small>
</div>
</div>
</div>

</div>

<script>

/* ========================
STATE
======================== */

let username = "User" + Math.floor(Math.random()*999);

let data = {
Main:{
general:[],
gaming:[],
random:[]
},
Dev:{
announcements:[],
bugs:[],
chat:[]
}
};

let currentServer = "Main";
let currentChannel = "general";

/* ========================
INIT
======================== */

document.getElementById("usernameDisplay").innerText = username;

function renderServers(){
let container = document.getElementById("servers");
container.innerHTML = "";
Object.keys(data).forEach(server=>{
let div = document.createElement("div");
div.className="server"+(server===currentServer?" active":"");
div.innerText = server[0];
div.onclick=()=>{
currentServer=server;
currentChannel=Object.keys(data[server])[0];
renderAll();
};
container.appendChild(div);
});
}

function renderChannels(){
let container = document.getElementById("channelList");
container.innerHTML="";
document.getElementById("serverTitle").innerText=currentServer;

Object.keys(data[currentServer]).forEach(channel=>{
let div=document.createElement("div");
div.className="channel"+(channel===currentChannel?" active":"");
div.innerText="# "+channel;
div.onclick=()=>{
currentChannel=channel;
renderMessages();
renderChannels();
};
container.appendChild(div);
});
}

function renderMessages(){
let container=document.getElementById("messages");
container.innerHTML="";
document.getElementById("channelTitle").innerText="# "+currentChannel;

data[currentServer][currentChannel].forEach(msg=>{
let div=document.createElement("div");
div.className="message "+(msg.user===username?"me":"other");
div.innerText=msg.user+": "+msg.text;
container.appendChild(div);
});

container.scrollTop=container.scrollHeight;
}

function renderAll(){
renderServers();
renderChannels();
renderMessages();
}

function sendMessage(){
let input=document.getElementById("messageInput");
if(input.value.trim()==="") return;

data[currentServer][currentChannel].push({
user:username,
text:input.value
});

input.value="";
renderMessages();
}

document.getElementById("messageInput")
.addEventListener("keypress",function(e){
if(e.key==="Enter") sendMessage();
});

renderAll();

</script>

</body>
</html>
